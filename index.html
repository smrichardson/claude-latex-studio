<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LaTeX · Claude Studio</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/favicon-32.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <meta name="theme-color" content="#34516e" />
    <script>
      if ("serviceWorker" in navigator)
        window.addEventListener("load", () => navigator.serviceWorker.register("/sw.js").catch(() => {}));
    </script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.28/dist/katex.min.css" />
    <style>
      /* Classic palettes — switched by data-theme on <body>. Default = manuscript. */
      :root,
      body[data-theme="manuscript"] {
        --bg:#f6f4ee; --fg:#232019; --muted:#8a8578; --panel:#ece7dd; --border:#dcd5c8;
        --accent:#3a5a7a; --on-accent:#ffffff; --btn:#e4ded2; --btn-hover:#d8d0c0;
        --input:#fffdf8; --pdf-mat:#d8d2c6; --user-msg:#e6e0d4; --bot-msg:#fffdf8;
        --ok:#3f7d4f; --err:#a8432f;
      }
      body[data-theme="slate"] {
        --bg:#1b1d21; --fg:#d6d8db; --muted:#8b9099; --panel:#24272c; --border:#34383f;
        --accent:#6f93b8; --on-accent:#0e0f12; --btn:#2c3036; --btn-hover:#363b42;
        --input:#15171a; --pdf-mat:#2a2d33; --user-msg:#2c3036; --bot-msg:#16181b;
        --ok:#6fae7e; --err:#cc7e6e;
      }
      body[data-theme="bw"] {
        --bg:#ffffff; --fg:#111111; --muted:#777777; --panel:#f5f5f5; --border:#e4e4e4;
        --accent:#1456b0; --on-accent:#ffffff; --btn:#eeeeee; --btn-hover:#e2e2e2;
        --input:#ffffff; --pdf-mat:#d0d0d0; --user-msg:#eef2f9; --bot-msg:#ffffff;
        --ok:#2f7d4f; --err:#b23a2a;
      }

      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--fg); }
      #app { display: grid; grid-template-rows: auto 1fr; height: 100vh; }

      .toolbar { display: flex; align-items: center; gap: 10px; padding: 8px 14px; background: var(--panel); border-bottom: 1px solid var(--border); }
      .toolbar .title { font-weight: 700; letter-spacing: .02em; margin-right: 6px; }
      .toolbar .spacer { flex: 1; }
      button, select { background: var(--btn); color: var(--fg); border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; font-size: 13px; cursor: pointer; }
      button:hover { background: var(--btn-hover); }
      button.primary { background: var(--accent); color: var(--on-accent); border-color: var(--accent); font-weight: 600; }
      button.primary:hover { filter: brightness(1.08); background: var(--accent); }
      button.on, button.sm.on { background: var(--accent); color: var(--on-accent); border-color: var(--accent); }
      button.sm { padding: 3px 8px; font-size: 12px; }
      .status { font-size: 12px; color: var(--muted); min-width: 120px; text-align: right; }
      .status.err { color: var(--err); } .status.ok { color: var(--ok); }

      .panes { display: flex; min-height: 0; height: 100%; }
      .pane { display: flex; flex-direction: column; min-width: 140px; overflow: hidden; }
      .pane > .head { font-size: 11px; font-weight: 600; letter-spacing: .06em; color: var(--muted); padding: 6px 10px; background: var(--panel); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 6px; min-height: 33px; }
      .pane > .head select { padding: 2px 6px; font-size: 12px; max-width: 150px; }
      .pane > .body { flex: 1; min-height: 0; overflow: hidden; }
      #editor { height: 100%; min-height: 0; }
      .cm-editor { height: 100%; }
      .cm-scroller { overflow: auto; }
      .empty { color: var(--muted); font-size: 13px; padding: 16px; text-align: center; }
      /* pdf.js container — used for both compiled PDF (SyncTeX) and paper (highlights) */
      .pdfjs { width: 100%; height: 100%; overflow: auto; background: var(--pdf-mat); padding: 10px 0; text-align: center; }
      .pdfjs .pg { position: relative; display: inline-block; margin: 0 auto 10px; }
      .pdfjs canvas { display: block; box-shadow: 0 1px 6px rgba(0,0,0,.3); cursor: pointer; background: #fff; }
      .pdfjs .overlay { position: absolute; inset: 0; }
      .pdfjs.hl-mode canvas { cursor: crosshair; }
      .pdfjs .hl { position: absolute; background: rgba(250,204,21,.32); border: 1px solid rgba(250,204,21,.7); border-radius: 2px; }
      .pdfjs .hl:hover { background: rgba(250,204,21,.45); }
      .pdfjs .hl-btn { position: absolute; top: -11px; width: 22px; height: 22px; padding: 0; border-radius: 50%; font-size: 11px; line-height: 1; display: none; align-items: center; justify-content: center; box-shadow: 0 1px 3px rgba(0,0,0,.35); }
      .pdfjs .hl:hover .hl-btn { display: inline-flex; }
      .pdfjs .hl-ask { right: 20px; background: var(--accent); border-color: var(--accent); color: var(--on-accent); }
      .pdfjs .hl-rm { right: -6px; background: var(--err); border-color: var(--err); color: #fff; }
      .pdfjs .hl-draft { position: absolute; background: rgba(250,204,21,.22); border: 1px dashed rgba(250,204,21,.95); pointer-events: none; }
      .pdfjs .flash { position: absolute; background: color-mix(in srgb, var(--accent) 38%, transparent); pointer-events: none; transition: opacity .6s; }

      .resizer { flex: 0 0 6px; cursor: col-resize; background: var(--border); transition: background .1s; }
      .resizer:hover { background: var(--accent); }
      .pane.hidden, .resizer.hidden { display: none; }
      .pane-toggles { display: flex; gap: 4px; margin-right: 8px; }

      /* rewind button on user chat messages (shown on hover) */
      .msg.user { position: relative; }
      .msg.user .rw { position: absolute; left: -26px; top: 6px; width: 22px; height: 22px; padding: 0; border-radius: 50%; font-size: 10px; line-height: 1; display: none; align-items: center; justify-content: center; }
      .msg.user:hover .rw { display: inline-flex; }

      #chat { display: flex; flex-direction: column; height: 100%; }
      #log { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 10px; }
      .msg { font-size: 13px; line-height: 1.45; padding: 8px 10px; border-radius: 8px; white-space: pre-wrap; word-wrap: break-word; }
      .msg.user { background: var(--user-msg); align-self: flex-end; max-width: 92%; }
      .msg.bot { background: var(--bot-msg); border: 1px solid var(--border); }
      .msg.sys { color: var(--muted); font-style: italic; font-size: 12px; }
      .composer { border-top: 1px solid var(--border); padding: 8px; display: flex; flex-direction: column; gap: 6px; }
      .composer .ctx { font-size: 11px; color: var(--muted); }
      .composer textarea { width: 100%; resize: none; height: 54px; background: var(--input); color: var(--fg); border: 1px solid var(--border); border-radius: 6px; padding: 6px 8px; font-family: inherit; font-size: 13px; }
      .composer .row { display: flex; gap: 8px; align-items: center; }
      .composer label { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 4px; }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="toolbar">
        <span class="title">LaTeX · Claude Studio</span>
        <button id="project-btn" title="Switch the project folder">📁 <span id="project-name">project</span></button>
        <button id="save-btn" class="primary">Save</button>
        <button id="compile">Compile</button>
        <button id="toggle-rt" class="on">Rich Text: ON</button>
        <span class="spacer"></span>
        <span class="pane-toggles">
          <button id="pv-0" class="sm on" title="Show/hide the paper pane">Paper</button>
          <button id="pv-1" class="sm on" title="Show/hide the editor">Editor</button>
          <button id="pv-2" class="sm on" title="Show/hide the compiled PDF">PDF</button>
          <button id="pv-3" class="sm on" title="Show/hide the Claude chat">Chat</button>
        </span>
        <span id="status" class="status">ready</span>
        <select id="theme-select" title="Theme" style="margin-left:10px">
          <option value="manuscript">Manuscript</option>
          <option value="slate">Slate</option>
          <option value="bw">B&amp;W</option>
        </select>
      </div>
      <div class="panes" id="panes">
        <!-- PAPER (far left — what you're reading) -->
        <div class="pane" data-grow="1.1">
          <div class="head">
            PAPER
            <select id="paper-select"><option value="">— none —</option></select>
            <button id="paper-refresh" class="sm" title="Re-scan papers/">↻</button>
            <button id="paper-upload-btn" class="sm" title="Upload a PDF">＋</button>
            <input id="paper-file" type="file" accept="application/pdf" style="display:none" />
            <button id="paper-tidy" class="sm" title="Rename arXiv-numbered PDFs to readable names (Claude reads each)">🧹</button>
            <span style="flex:1"></span>
            <button id="hl-toggle" class="sm" title="Drag on the page to highlight">✏︎</button>
            <button id="pz-out" class="sm" title="Zoom out">−</button>
            <button id="pz-in" class="sm" title="Zoom in">+</button>
          </div>
          <div class="body">
            <div id="paper-pdf" class="pdfjs" style="display:none"></div>
            <div id="paper-empty" class="empty">
              Drop PDFs into <code>project/papers/</code> (or use ＋), then pick one here.
            </div>
          </div>
        </div>
        <div class="resizer"></div>

        <!-- EDITOR -->
        <div class="pane" data-grow="1.3">
          <div class="head">EDITOR
            <select id="tex-select" title="File to edit" style="max-width:190px; margin-left:6px"></select>
            <button id="preamble-toggle" class="sm" title="Hide/show the preamble">Hide preamble</button>
            <span style="flex:1"></span>
            <span id="save-state" style="text-transform:none; font-weight:400; margin-right:6px"></span>
            <button id="img-insert" class="sm" title="Insert image (or drag one onto the editor)">🖼</button>
            <input id="img-file" type="file" accept="image/*" style="display:none" />
          </div>
          <div class="body"><div id="editor"></div></div>
        </div>
        <div class="resizer"></div>

        <!-- COMPILED -->
        <div class="pane" data-grow="1.1">
          <div class="head">COMPILED
            <button id="chl-toggle" class="sm" title="Highlight the compiled PDF (drag to mark spots to revise)">✏︎</button>
            <span style="flex:1"></span>
            <button id="cz-out" class="sm" title="Zoom out">−</button>
            <button id="cz-in" class="sm" title="Zoom in">+</button>
          </div>
          <div class="body"><div id="pdf" class="pdfjs"></div></div>
        </div>
        <div class="resizer"></div>

        <!-- CLAUDE -->
        <div class="pane" data-grow="0.95">
          <div class="head">CLAUDE
            <span style="flex:1"></span>
            <button id="new-chat" class="sm" title="Start a fresh conversation">New</button>
          </div>
          <div class="body">
            <div id="chat">
              <div id="log">
                <div class="msg sys">Chat with Claude about your paper or writeup. Highlight a passage to ask about it, or turn on Edit to let Claude write.</div>
              </div>
              <div class="composer">
                <div class="ctx" id="ctx">writeup only</div>
                <textarea id="prompt" placeholder="Chat with Claude!"></textarea>
                <div class="row">
                  <label><input type="checkbox" id="editmode" /> Edit mode</label>
                  <span class="spacer" style="flex:1"></span>
                  <button id="send" class="primary">Send</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
